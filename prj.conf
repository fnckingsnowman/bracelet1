# ========================================
# I2C and Sensor Configuration
# ========================================
CONFIG_I2C=y
CONFIG_SENSOR=y

# ========================================
# LSM6DSO Driver (used for LSM6DS3)
# ========================================
# Note: Zephyr will automatically enable this when device tree has st,lsm6dso

# ========================================
# Logging (helpful for debugging)
# ========================================
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_SENSOR_LOG_LEVEL_DBG=y
CONFIG_I2C_LOG_LEVEL_DBG=y

# ========================================
# Console/Serial for printf debugging
# ========================================
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y

# ========================================
# Floating Point Support (for sensor data)
# ========================================
CONFIG_CBPRINTF_FP_SUPPORT=y

# ========================================
# Thread Stack Sizes
# ========================================
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# ========================================
# Math Library (for calculations)
# ========================================
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y