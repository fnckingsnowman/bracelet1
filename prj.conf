# ============================================
# Sleep Bracelet - MAX30102 Demo Configuration
# ============================================

# --------------------------------------------
# General
# --------------------------------------------
CONFIG_HEAP_MEM_POOL_SIZE=4096
CONFIG_MAIN_STACK_SIZE=4096

# --------------------------------------------
# Logging - FIXED CONFIGURATION
# --------------------------------------------
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y

# Set default level to INFO (not DEBUG)
# 0=OFF, 1=ERR, 2=WRN, 3=INF, 4=DBG
CONFIG_LOG_DEFAULT_LEVEL=3

# Increase buffer size to prevent drops
CONFIG_LOG_BUFFER_SIZE=4096

# Use deferred logging (better performance)
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=2048

# IMPORTANT: Silence noisy Zephyr subsystems
CONFIG_MPU_LOG_LEVEL_OFF=y
CONFIG_LOG_FUNC_NAME_PREFIX_ERR=y
CONFIG_LOG_FUNC_NAME_PREFIX_WRN=y

# --------------------------------------------
# Console
# --------------------------------------------
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# --------------------------------------------
# GPIO
# --------------------------------------------
CONFIG_GPIO=y

# --------------------------------------------
# I2C
# --------------------------------------------
CONFIG_I2C=y

# Silence I2C debug logs (can be noisy)
CONFIG_I2C_LOG_LEVEL_INF=y

# --------------------------------------------
# Floating Point
# --------------------------------------------
CONFIG_FPU=y

# --------------------------------------------
# C Library
# --------------------------------------------
CONFIG_NEWLIB_LIBC=y

# --------------------------------------------
# Timing
# --------------------------------------------
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000